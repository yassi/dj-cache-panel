services:

  # Development container
  dev:
    build:
      context: .
      dockerfile: example_project/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.10}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app/example_project
    tty: true
    stdin_open: true
    depends_on:
      - redis
    command: "/bin/bash"

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  valkey:
    image: valkey/valkey:9
    command: [ "valkey-server", "--port", "6380" ]
    ports:
      - "6380:6380"

  memcached:
    image: memcached:1.6
    ports:
      - "11211:11211"
